# CloudFormation template version - this is the standard version for all modern templates
AWSTemplateFormatVersion: '2010-09-09'

# Description of what this CloudFormation stack does
Description: A CloudFormation template to set up an S3 bucket for API storage

# Resources section - defines all AWS resources to be created
Resources:
  # S3 bucket resource for storing API-related file
  APIS3Bucket:
    # Resource type - creates an Amazon S3 bucket
    Type: 'AWS::S3::Bucket'
    
    # Configuration properties for the S3 bucket
    Properties:
      # Name of the bucket (must be globally unique across all AWS accounts)
      # Note: Bucket names must be DNS-compliant (lowercase, no underscores)
      BucketName: api-s3-starter-bucket